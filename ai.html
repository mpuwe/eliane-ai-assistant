<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>
   Dr Eliane AI Assistant
  </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
   body {
      font-family: "Montserrat", sans-serif;
      margin: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(26,26,26,0.8) 0%, rgba(0,31,77,0.8) 50%, rgba(47,15,15,0.8) 100%);
      color: white;
      display: flex;
      flex-direction: column;
    }
    #background-avatar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      filter: brightness(0.4);
      z-index: -1;
      user-select: none;
      pointer-events: none;
    }
    #chat-panel {
      display: flex;
      flex-direction: column;
      background-color: rgba(243, 244, 246, 0.1);
      border-left: 1px solid rgba(209, 213, 219, 0.3);
      width: 32vw;
      max-width: 32vw;
      min-width: 320px;
      height: 100vh;
      overflow: hidden;
      transition: width 0.35s ease-in-out;
      z-index: 20;
      color: white;
      backdrop-filter: saturate(180%) blur(20px);
    }
    #track-panel {
      width: 0;
      min-width: 0;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      transition: width 0.35s ease;
      border-right: 1px solid rgba(209, 213, 219, 0.3);
      background: rgba(10, 18, 28, 0.74);
      backdrop-filter: saturate(180%) blur(14px);
      padding: 0;
      z-index: 23;
    }
    #track-panel.open {
      width: 20vw;
      min-width: 250px;
      padding: 1rem 0.85rem;
    }
    .track-action {
      border: 1px solid rgba(159, 239, 255, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: #d9f7ff;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: left;
      padding: 0.65rem 0.8rem;
      transition: all 0.2s ease;
    }
    .track-action:hover,
    .track-action:focus {
      outline: none;
      border-color: #00a8cc;
      background: rgba(0, 168, 204, 0.22);
    }
    #chat-messages {
      flex-grow: 1;
      overflow-y: auto;
      padding: 1rem;
      scroll-behavior: smooth;
      color: white;
    }
    #chat-messages::-webkit-scrollbar {
      width: 8px;
    }
    #chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    #chat-messages::-webkit-scrollbar-thumb {
      background-color: rgba(255 255 255 / 0.3);
      border-radius: 4px;
    }
    #input-form {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.6);
      border-top: 1px solid rgba(255,255,255,0.2);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 30;
      box-shadow: 0 -2px 8px rgb(0 0 0 / 0.6);
      backdrop-filter: saturate(180%) blur(20px);
    }
    #quick-actions {
      position: fixed;
      bottom: 4.8rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 35;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      width: min(980px, calc(100vw - 2rem));
      pointer-events: auto;
    }
    .quick-action-btn {
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(10, 10, 10, 0.6);
      color: #d7f5ff;
      border-radius: 9999px;
      padding: 0.35rem 0.8rem;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      transition: all 0.2s ease;
    }
    .quick-action-btn:hover,
    .quick-action-btn:focus {
      outline: none;
      background: rgba(0, 168, 204, 0.25);
      border-color: #00a8cc;
      color: white;
    }
    #local-ai-badge {
      position: fixed;
      top: 0.8rem;
      right: 0.8rem;
      z-index: 45;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(0, 168, 204, 0.6);
      color: #9fefff;
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
    }
    #control-rail {
      position: fixed;
      top: 3.5rem;
      left: 0.8rem;
      z-index: 44;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .rail-btn {
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(10, 10, 10, 0.7);
      color: #d8f5ff;
      border-radius: 9999px;
      padding: 0.45rem 0.85rem;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }
    .rail-btn:hover,
    .rail-btn:focus {
      outline: none;
      border-color: #00a8cc;
      background: rgba(0, 168, 204, 0.25);
      color: white;
    }
    dialog#auth-modal,
    dialog#history-modal {
      border: none;
      padding: 0;
      background: rgba(0, 0, 0, 0.72);
      inset: 0;
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
    }
    dialog#auth-modal::backdrop,
    dialog#history-modal::backdrop {
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(4px);
    }
    .modal-shell {
      width: min(560px, calc(100vw - 2rem));
      margin: 8vh auto;
      background: rgba(9, 12, 18, 0.92);
      border: 1px solid #007a9a;
      border-radius: 14px;
      padding: 1.25rem;
      color: white;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.65);
    }
    .modal-shell h3 {
      margin: 0 0 0.85rem;
      color: #9fefff;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 1rem;
      font-weight: 800;
    }
    .auth-input {
      width: 100%;
      border: 1px solid rgba(159, 239, 255, 0.35);
      background: rgba(255, 255, 255, 0.04);
      color: white;
      border-radius: 8px;
      padding: 0.55rem 0.7rem;
      margin-bottom: 0.65rem;
      font-size: 0.92rem;
    }
    .auth-input:focus {
      outline: none;
      border-color: #00a8cc;
      box-shadow: 0 0 0 2px rgba(0, 168, 204, 0.45);
    }
    .auth-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.85rem;
    }
    .auth-tab {
      flex: 1;
      border: 1px solid rgba(159, 239, 255, 0.32);
      border-radius: 999px;
      background: transparent;
      color: #d1f4ff;
      padding: 0.45rem 0.8rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
    }
    .auth-tab.active {
      background: rgba(0, 168, 204, 0.25);
      border-color: #00a8cc;
      color: white;
    }
    .tiny-note {
      font-size: 0.74rem;
      color: #b8ecfb;
      line-height: 1.3;
      margin-top: 0.5rem;
    }
    .history-item {
      border: 1px solid rgba(159, 239, 255, 0.25);
      border-radius: 10px;
      padding: 0.65rem 0.75rem;
      margin-bottom: 0.55rem;
      background: rgba(255, 255, 255, 0.03);
    }
    .history-item h4 {
      margin: 0 0 0.2rem;
      color: #9fefff;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .history-item p {
      margin: 0;
      color: #e6faff;
      font-size: 0.86rem;
    }
    #user-input {
      flex-grow: 1;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 9999px;
      padding: 0.5rem 1.5rem;
      font-size: 1rem;
      color: white;
      background: transparent;
      outline-offset: 2px;
      font-weight: 500;
      font-family: "Montserrat", sans-serif;
    }
    #user-input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    #user-input:focus {
      border-color: #00a8cc;
      box-shadow: 0 0 8px #00a8cc;
      outline: none;
      background: rgba(255 255 255 / 0.1);
    }
    #send-btn,
    #video-talk-btn {
      background: transparent;
      border: none;
      color: #00a8cc;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 9999px;
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:hover,
    #video-talk-btn:hover,
    #send-btn:focus,
    #video-talk-btn:focus {
      color: #007a9a;
      outline: none;
      box-shadow: 0 0 0 3px #007a9a;
    }
    #deep-contents-btn {
      position: fixed;
      bottom: 5rem;
      left: 1rem;
      background-color: #00a8cc;
      color: black;
      border-radius: 9999px;
      padding: 0.5rem 1.25rem;
      font-weight: 700;
      box-shadow: 0 4px 12px rgb(0 168 204 / 0.6);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      z-index: 40;
      transition: background-color 0.2s ease;
      font-family: "Montserrat", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.875rem;
    }
    #deep-contents-btn:hover,
    #deep-contents-btn:focus {
      background-color: #007a9a;
      outline: none;
      box-shadow: 0 0 0 4px #007a9a;
    }
    dialog#deep-contents-panel {
      border: none;
      padding: 0;
      margin: 0;
      background: rgba(0, 0, 0, 0.75);
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 50;
      font-family: "Montserrat", sans-serif;
      color: white;
    }
    dialog#deep-contents-panel[open] {
      display: flex;
    }
    #deep-contents-panel > div {
      background: rgba(10, 10, 10, 0.9);
      border-radius: 0.75rem;
      width: 90vw;
      max-width: 900px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgb(0 0 0 / 0.8);
      border: 1px solid #007a9a;
    }
    #deep-contents-panel header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #007a9a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #deep-contents-panel header h3 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #00a8cc;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0;
    }
    #deep-contents-close {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      color: #007a9a;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 9999px;
      transition: color 0.2s ease;
    }
    #deep-contents-close:hover,
    #deep-contents-close:focus {
      color: #00a8cc;
      outline: none;
      box-shadow: 0 0 0 3px #00a8cc;
    }
    nav[aria-label="Deep Contents Tabs"] {
      display: flex;
      border-bottom: 1px solid #007a9a;
      background: transparent;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    nav[aria-label="Deep Contents Tabs"]::-webkit-scrollbar {
      display: none;
    }
    nav[aria-label="Deep Contents Tabs"] button {
      flex: none;
      padding: 0.75rem 1.5rem;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #00a8cc;
      border-bottom: 3px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    nav[aria-label="Deep Contents Tabs"] button[aria-selected="true"] {
      color: #007a9a;
      border-color: #007a9a;
      font-weight: 900;
    }
    nav[aria-label="Deep Contents Tabs"] button:focus {
      outline: none;
      box-shadow: 0 0 0 3px #00a8cc;
    }
    .tab-panel {
      flex-grow: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      max-height: calc(90vh - 4.5rem - 48px);
      color: white;
    }
    .tab-panel.hidden {
      display: none;
    }
    #pill-reminder-form input,
    #pill-reminder-form textarea {
      width: 100%;
      border: 1px solid #007a9a;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      color: white;
      background: transparent;
      outline-offset: 2px;
      resize: none;
      font-family: "Montserrat", sans-serif;
      font-weight: 500;
    }
    #pill-reminder-form input:focus,
    #pill-reminder-form textarea:focus {
      border-color: #00a8cc;
      box-shadow: 0 0 8px #00a8cc;
      outline: none;
      background: rgba(255 255 255 / 0.1);
    }
    #pill-reminder-form button {
      background-color: #00a8cc;
      color: black;
      font-weight: 700;
      border: none;
      border-radius: 0.375rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
      font-family: "Montserrat", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    #pill-reminder-form button:hover,
    #pill-reminder-form button:focus {
      background-color: #007a9a;
      outline: none;
      box-shadow: 0 0 0 3px #007a9a;
      color: white;
    }
    #pill-reminder-list > div {
      border: 1px solid #00a8cc;
      background-color: rgba(0, 168, 204, 0.15);
      border-radius: 0.375rem;
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      color: white;
      font-family: "Montserrat", sans-serif;
    }
    #pill-reminder-list h4 {
      font-weight: 700;
      color: #00a8cc;
      margin: 0 0 0.25rem 0;
    }
    #pill-reminder-list time,
    #pill-reminder-list p {
      font-size: 0.875rem;
      color: #a0e9ff;
      margin: 0;
    }
    #pill-reminder-list button {
      background: transparent;
      border: none;
      color: #f87171;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 0.375rem;
      transition: color 0.2s ease;
    }
    #pill-reminder-list button:hover,
    #pill-reminder-list button:focus {
      color: #b91c1c;
      outline: none;
      box-shadow: 0 0 0 2px rgba(185, 28, 28, 0.5);
    }
    #pharmacy-results > div,
    #hospital-results > div {
      border: 1px solid #00a8cc;
      background-color: rgba(0, 168, 204, 0.15);
      border-radius: 0.375rem;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      color: white;
      font-family: "Montserrat", sans-serif;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    #pharmacy-results > div:hover,
    #hospital-results > div:hover {
      background-color: rgba(0, 168, 204, 0.3);
    }
    #pharmacy-results h4,
    #hospital-results h4 {
      font-weight: 700;
      color: #00a8cc;
      margin: 0 0 0.25rem 0;
    }
    #pharmacy-results p,
    #hospital-results p,
    #hospital-results a {
      font-size: 0.875rem;
      color: #a0e9ff;
      margin: 0.125rem 0;
    }
    #hospital-results a {
      text-decoration: none;
      font-weight: 700;
      color: #00a8cc;
      transition: color 0.2s ease;
    }
    #hospital-results a:hover,
    #hospital-results a:focus {
      color: #007a9a;
      outline: none;
      text-decoration: underline;
    }
    .details-panel {
      background-color: rgba(0, 168, 204, 0.2);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-top: 0.5rem;
      font-size: 0.875rem;
      color: #a0e9ff;
      font-family: "Montserrat", sans-serif;
      display: none;
      flex-direction: column;
      gap: 0.5rem;
    }
    .details-panel.visible {
      display: flex;
    }
    .details-panel img {
      max-width: 100%;
      border-radius: 0.5rem;
      object-fit: cover;
      max-height: 200px;
      margin-bottom: 0.5rem;
      user-select: none;
      pointer-events: none;
    }
    .more-btn {
      background: transparent;
      border: none;
      color: #00a8cc;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.875rem;
      transition: color 0.2s ease;
      align-self: flex-start;
    }
    .more-btn:hover,
    .more-btn:focus {
      color: #007a9a;
      outline: none;
      text-decoration: underline;
    }
    /* Avatar container */
    #avatar-container {
      flex-grow: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
      transition: width 0.5s ease-in-out;
      user-select: none;
    }
    #avatar-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 0.5rem;
      user-select: none;
      pointer-events: none;
      transform-origin: center bottom;
      position: relative;
      z-index: 10;
      filter: drop-shadow(0 0 4px rgba(0, 168, 204, 0.7));
    }
    #avatar-image.speaking {
      animation: talkBob 0.65s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(0, 168, 204, 0.9));
    }
    @keyframes talkBob {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.01); }
    }
    #avatar-static {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 0.5rem;
      user-select: none;
      pointer-events: none;
      z-index: 5;
      opacity: 1;
      transition: opacity 0.3s ease;
      filter: drop-shadow(0 0 4px rgba(0, 168, 204, 0.5));
    }
    #audio-wave {
      position: absolute;
      bottom: 3.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.25rem;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.3s ease;
      z-index: 20;
    }
    #audio-wave span {
      width: 0.25rem;
      border-radius: 9999px;
      background-color: #00a8cc;
      animation: pulse 1.5s infinite ease-in-out;
    }
    #audio-wave span:nth-child(2) {
      animation-delay: 0.15s;
      height: 1.5rem;
    }
    #audio-wave span:nth-child(4) {
      animation-delay: 0.45s;
      height: 1.25rem;
    }
    #audio-wave span:nth-child(5) {
      animation-delay: 0.6s;
      height: 1rem;
    }
    #audio-wave span:nth-child(1),
    #audio-wave span:nth-child(3) {
      height: 1.25rem;
      animation-delay: 0s, 0.3s;
    }
    @keyframes pulse {
      0%, 100% {
        opacity: 0.3;
        transform: scaleY(1);
      }
      50% {
        opacity: 1;
        transform: scaleY(1.8);
      }
    }
    @media (max-width: 768px) {
      #quick-actions {
        bottom: 5.35rem;
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 0.15rem;
      }
      #control-rail {
        top: 0.65rem;
        left: 0.65rem;
      }
      #chat-panel {
        width: 100vw;
        max-width: 100vw;
        min-width: 100vw;
        height: 35vh;
        border-left: none;
        border-top: 1px solid rgba(209, 213, 219, 0.3);
      }
      #track-panel.open {
        width: 100vw;
        min-width: 100vw;
        height: 25vh;
      }
      #main-container {
        flex-direction: column;
      }
      #avatar-image {
        width: 100vw !important;
        height: auto !important;
      }
    }
  </style>
 </head>
 <body>
  <img alt="Cheerful darkskinned girl smiling broadly with natural hair, representing Dr Eliane AI assistant" height="1080" id="background-avatar" src="dr_elianee.png" width="1920"/>
  <div aria-label="Assistant mode status" id="local-ai-badge">
   Local AI Mode · No External LLM APIs
  </div>
  <div id="control-rail">
   <button class="rail-btn" id="new-topic-btn" type="button">
    New Topic
   </button>
   <button class="rail-btn" id="history-btn" type="button">
    Chat History
   </button>
   <button class="rail-btn" id="logout-btn" type="button">
    Logout
   </button>
  </div>
  <dialog aria-labelledby="auth-title" id="auth-modal">
   <div class="modal-shell">
    <h3 id="auth-title">
     Secure Access
    </h3>
    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-login-tab" type="button">Login</button>
      <button class="auth-tab" id="auth-signup-tab" type="button">Sign Up</button>
    </div>
    <form id="auth-form">
      <input class="auth-input" id="auth-name" placeholder="Name (for sign up)" type="text"/>
      <input autocomplete="email" class="auth-input" id="auth-email" placeholder="Email" required="" type="email"/>

      function formatTime(date) {
        const d = new Date(date);
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function addChatMessage({ from, type, content, timestamp }) {
        const messageWrapper = document.createElement("div");
        messageWrapper.className = from === "user" ? "flex justify-end" : "flex justify-start";

        const messageBubble = document.createElement("div");

          "max-w-[75%] px-4 py-2 rounded-lg shadow " +
          (from === "user"
            ? "bg-[#00a8cc] text-black rounded-br-none"
            : "bg-white/20 text-white rounded-bl-none");

        if (type === "text") {
          messageBubble.textContent = content;
        } else if (type === "video") {
          const videoReply = document.createElement("div");
          videoReply.className = "relative w-48 h-64 rounded-lg overflow-hidden shadow-lg";
          const avatarPreview = document.createElement("img");
          avatarPreview.src = "dr_elianee.png";
          avatarPreview.alt = "Dr Eliane assistant speaking";
          avatarPreview.className = "object-cover w-full h-full";

          const label = document.createElement("span");

            "absolute bottom-1 left-1 bg-[#00a8cc] text-black text-xs px-2 py-0.5 rounded";

          videoReply.appendChild(avatarPreview);
          videoReply.appendChild(label);
          messageBubble.appendChild(videoReply);
        }

        const timeSpan = document.createElement("time");
        timeSpan.className = "block text-xs text-white/80 mt-1";
        timeSpan.dateTime = timestamp;
        timeSpan.textContent = formatTime(timestamp);

        messageBubble.appendChild(timeSpan);
        messageWrapper.appendChild(messageBubble);

        if (type === "text") {
          saveHistoryEntry(from, content);
        } else if (type === "video") {
          saveHistoryEntry(from, "[video reply]");
        }
      }

      function inferHealthContext(text) {
        const lower = text.toLowerCase();
        const symptomLexicon = [
          "fever", "cough", "headache", "nausea", "vomiting", "diarrhea",
          "dizziness", "fatigue", "rash", "pain", "anxiety", "stress",
          "insomnia", "sore throat", "congestion",
        ];
        const foundSymptoms = symptomLexicon.filter((item) => lower.includes(item));
        const medications = [];
        if (lower.includes("ibuprofen")) medications.push("ibuprofen");
        if (lower.includes("paracetamol") || lower.includes("acetaminophen")) medications.push("paracetamol/acetaminophen");
        if (lower.includes("antibiotic")) medications.push("antibiotic");

        const conditions = [];
        if (lower.includes("diabetes")) conditions.push("diabetes");
        if (lower.includes("hypertension") || lower.includes("high blood pressure")) conditions.push("hypertension");
        if (lower.includes("asthma")) conditions.push("asthma");
        if (lower.includes("pregnan")) conditions.push("pregnancy");

        if (foundSymptoms.length) {
          conversationState.recentSymptoms = [...new Set([...conversationState.recentSymptoms, ...foundSymptoms])].slice(-8);
        }
        if (medications.length) {
          conversationState.medications = [...new Set([...conversationState.medications, ...medications])].slice(-8);
        }
        if (conditions.length) {
          conversationState.conditions = [...new Set([...conversationState.conditions, ...conditions])].slice(-6);
        }
      }

      function buildPersonalizationHint() {
        const hints = [];
        if (conversationState.recentSymptoms.length) {
          hints.push(`Noted symptoms: ${conversationState.recentSymptoms.join(", ")}.`);
        }
        if (conversationState.conditions.length) {
          hints.push(`Important conditions: ${conversationState.conditions.join(", ")}.`);
        }
        if (conversationState.medications.length) {
          hints.push(`Mentioned medicines: ${conversationState.medications.join(", ")}.`);
        }
        return hints.length ? `\n\n${hints.join(" ")}` : "";
      }

      function assessIntent(text) {
        const lower = text.toLowerCase();
        const checks = [
          { intent: "emergency", score: emergencyKeywords.some((k) => lower.includes(k)) ? 1 : 0 },
          { intent: "pill_reminder", score: /pill|medication|dose|reminder|tablet/.test(lower) ? 0.95 : 0 },
          { intent: "pharmacy", score: /pharmacy|drug store|medicine shop/.test(lower) ? 0.92 : 0 },
          { intent: "hospital", score: /hospital|clinic|er|emergency room/.test(lower) ? 0.92 : 0 },
          { intent: "mental_wellbeing", score: /anxiety|depress|stress|sleep|insomnia|burnout/.test(lower) ? 0.88 : 0 },
          { intent: "symptom_triage", score: /symptom|pain|fever|cough|nausea|vomit|diarrhea|headache|dizzy|rash/.test(lower) ? 0.85 : 0 },
          { intent: "greeting", score: /hello|hi|hey|good morning|good evening/.test(lower) ? 0.7 : 0 },
        ];
        return checks.sort((a, b) => b.score - a.score)[0];
      }

      function switchToTextMode() {
        if (mode === "text") return;
        mode = "text";
        mainContainer.style.width = "100vw";
        mainContainer.style.height = "100vh";
        mainContainer.style.display = "flex";
        mainContainer.style.flexDirection = "row";
        mainContainer.style.transition = "all 0.5s ease-in-out";
        mainContainer.style.gap = "0";
        avatarImage.style.width = "100%";
        avatarImage.style.height = "auto";
        avatarStatic.style.opacity = "1";
        audioWave.classList.add("hidden");
        userInput.focus();
      }

      function switchToVideoMode() {
        if (mode === "video") return;
        mode = "video";
        mainContainer.style.width = "100vw";
        mainContainer.style.height = "100vh";
        mainContainer.style.display = "flex";
        mainContainer.style.flexDirection = "row";
        mainContainer.style.transition = "all 0.5s ease-in-out";
        avatarImage.style.width = "100%";
        avatarImage.style.height = "auto";
        avatarStatic.style.opacity = "1";
        audioWave.classList.remove("hidden");
        userInput.focus();
      }

      function closeChatPanel() {
        switchToVideoMode();
        window.speechSynthesis?.cancel();
        userInput.value = "";
      }

      // Immediately welcome user on page load with female voice
      function welcomeUser() {
        const welcomeText = "Hello! I am Dr Eliane, your AI health assistant. How can I help you today?";
        addChatMessage({
          from: "ai",
          type: "video",
          content: "",
          timestamp: new Date().toISOString(),
        });
        speakText(welcomeText);
      }

      function simulateAIResponse(userText) {
        inferHealthContext(userText);
        const lowerText = userText.toLowerCase();
        const topIntent = assessIntent(userText);
        let responseText = "";

        if (topIntent.intent === "emergency") {
          responseText =
            "⚠️ Possible emergency signs detected. If this is severe or sudden, call emergency services now (911 in the U.S.) or go to the nearest ER immediately. While waiting: avoid driving yourself, stay with someone, and share your symptoms/medications with responders.";
          openDeepContentsPanel();
          selectTab("tab-btn-hospitals");
        } else if (topIntent.intent === "pill_reminder") {
          responseText =
            "I can help organize this safely.\n\n1) Open the Pill Reminder tab and add medication, date/time, and notes.\n2) Use notes for dosage, food instructions, and missed-dose instructions.\n3) Keep one reminder per medication time for clarity.";
          openDeepContentsPanel();
          selectTab("tab-btn-pill-reminder");
        } else if (topIntent.intent === "pharmacy") {
          responseText =
            "Use the 'Find Nearby Pharmacies' tab and enter your city/address. Review distance first, then tap 'More' for website/contact details when available.";
          openDeepContentsPanel();
          selectTab("tab-btn-pharmacies");
        } else if (topIntent.intent === "hospital") {
          responseText =
            "Use the 'Find Nearby Hospitals' tab and search by city/address. Prioritize shortest distance if symptoms are urgent.";
          openDeepContentsPanel();
          selectTab("tab-btn-hospitals");
        } else if (topIntent.intent === "mental_wellbeing") {
          responseText =
            "For stress, anxiety, or poor sleep, start with a 3-step plan: \n• Fixed sleep/wake window for 7 days.\n• 10-minute daylight walk in morning.\n• No caffeine 8 hours before bedtime.\n\nIf symptoms persist >2 weeks or affect safety/work, please speak with a licensed clinician.";
        } else if (topIntent.intent === "symptom_triage") {
          responseText =
            "I can help with first-pass triage. Please share:\n• your age range,\n• key symptoms and when they started,\n• severity (1–10),\n• fever or breathing/chest symptoms,\n• existing conditions/medications.\n\nIf symptoms suddenly worsen, seek urgent in-person care.";
        } else if (topIntent.intent === "greeting") {
          responseText = "Hello! I’m Dr Eliane in local AI mode. I can help with symptom triage, medication routines, and nearby care search.";
        } else {
          responseText =
            "I’m your local health assistant (no external LLM API required). I can: \n• triage symptoms,\n• build medication routines,\n• suggest when to seek urgent care,\n• help find nearby pharmacies/hospitals.";
        }

        if (lowerText.includes("nearby") && lowerText.includes("pharmacy")) {
          openDeepContentsPanel();
          selectTab("tab-btn-pharmacies");
        }
        if (lowerText.includes("nearby") && (lowerText.includes("hospital") || lowerText.includes("clinic"))) {
          openDeepContentsPanel();
          selectTab("tab-btn-hospitals");
        }

        responseText += buildPersonalizationHint();
        responseText += "\n\nNote: This assistant provides educational guidance and does not replace a licensed medical professional.";

        addChatMessage({
          from: "ai",
          type: "text",
          content: responseText,
          timestamp: new Date().toISOString(),
        });

        if (mode !== "text") {
          speakText(responseText.replace(/\n/g, " "));
        }
      }

      function speakText(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 1;
        utterance.pitch = 1;
        // Select a female voice if available
        const voices = window.speechSynthesis.getVoices();
        if (voices.length > 0) {
          const femaleVoice = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female'));
          if (femaleVoice) {
            utterance.voice = femaleVoice;
          } else {
            // fallback to any English voice
            const enVoice = voices.find(v => v.lang.startsWith('en'));
            if (enVoice) utterance.voice = enVoice;
          }
        }
        utterance.onstart = () => {
          avatarImage.classList.add("speaking");
          audioWave.classList.remove("hidden");
        };
        utterance.onend = () => {
          avatarImage.classList.remove("speaking");
          audioWave.classList.add("hidden");
        };

      function startListening() {
        if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
          alert("Sorry, your browser does not support Speech Recognition.");
          return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.continuous = false;

        recognition.onstart = () => {
          isListening = true;
          audioWave.classList.remove("hidden");
          videoTalkBtn.classList.add("text-[#007a9a]");
        };

        recognition.onend = () => {
          isListening = false;
          audioWave.classList.add("hidden");
          videoTalkBtn.classList.remove("text-[#007a9a]");

        recognition.onerror = (event) => {
          isListening = false;
          audioWave.classList.add("hidden");
          videoTalkBtn.classList.remove("text-[#007a9a]");
          console.error("Speech recognition error", event.error);

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript.trim();
          if (transcript) {
            addChatMessage({
              from: "user",
              type: "text",
              content: transcript,
              timestamp: new Date().toISOString(),
            });

      // Helper: distance calculation
      function distance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
          Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      // Fetch and render pharmacies with details and images from Wikidata + OSM
      async function fetchPharmacies(location) {
        pharmacyResults.innerHTML = "";
        const loading = document.createElement("p");
        loading.textContent = "Searching nearby pharmacies...";
        loading.className = "text-white/70 font-semibold";
        pharmacyResults.appendChild(loading);

        try {
          // Geocode location with Nominatim
          const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}`);
          const geoData = await geoRes.json();
          if (!geoData || geoData.length === 0) {
            pharmacyResults.innerHTML = `<p class="text-red-500 font-semibold">Location not found. Please try a different query.</p>`;
            return;
          }
          const { lat, lon } = geoData[0];

          // Overpass query for pharmacies within 5km
          const overpassQuery = `
            [out:json][timeout:25];
            (
              node["amenity"="pharmacy"](around:5000,${lat},${lon});
              way["amenity"="pharmacy"](around:5000,${lat},${lon});
              relation["amenity"="pharmacy"](around:5000,${lat},${lon});
            );
            out center tags qt 50;
          `;
          const overpassRes = await fetch("https://overpass-api.de/api/interpreter", {
            method: "POST",
            body: overpassQuery,
            headers: { "Content-Type": "text/plain" }
          });
          const overpassData = await overpassRes.json();

          pharmacyResults.innerHTML = "";

          if (!overpassData.elements || overpassData.elements.length === 0) {
            pharmacyResults.innerHTML = `<p class="text-white/70 font-semibold">No nearby pharmacies found within 5 km.</p>`;
            return;
          }

          // Prepare list with lat/lon and osm_id for Wikidata lookup
          const pharmacies = overpassData.elements.map(el => {
            let latEl = el.lat;
            let lonEl = el.lon;
            if (!latEl && el.center) {
              latEl = el.center.lat;
              lonEl = el.center.lon;
            }
            return {
              osm_id: el.id,
              osm_type: el.type,
              lat: latEl,
              lon: lonEl,
              tags: el.tags || {},
              distance: distance(lat, lon, latEl, lonEl)
            };
          });

          pharmacies.sort((a, b) => a.distance - b.distance);

          // Fetch Wikidata info for each pharmacy (limit 10)
          const maxResults = 10;
          const pharmaciesLimited = pharmacies.slice(0, maxResults);

          // Prepare IDs by type
          const nodeIds = pharmaciesLimited.filter(p => p.osm_type === "node").map(p => p.osm_id);
          const wayIds = pharmaciesLimited.filter(p => p.osm_type === "way").map(p => p.osm_id);
          const relationIds = pharmaciesLimited.filter(p => p.osm_type === "relation").map(p => p.osm_id);

          // Build FILTER for all osm ids and types
          let filters = [];
          if (nodeIds.length) filters.push(`?item wdt:P669 ?osmId . FILTER(?osmId IN (${nodeIds.map(id => `"${id}"`).join(", ")}))`);
          if (wayIds.length) filters.push(`?item wdt:P402 ?osmId . FILTER(?osmId IN (${wayIds.map(id => `"${id}"`).join(", ")}))`);
          if (relationIds.length) filters.push(`?item wdt:P3845 ?osmId . FILTER(?osmId IN (${relationIds.map(id => `"${id}"`).join(", ")}))`);

          if (filters.length === 0) {
            renderPharmaciesWithBasicInfo(pharmaciesLimited);
            return;
          }

          const sparqlQuery = `
            SELECT ?item ?itemLabel ?osmId ?image ?phone ?website ?head ?headLabel WHERE {
              {
                ${filters.join(" UNION ")}
              }
              OPTIONAL { ?item wdt:P18 ?image. }
              OPTIONAL { ?item wdt:P1329 ?phone. }
              OPTIONAL { ?item wdt:P856 ?website. }
              OPTIONAL { ?item wdt:P169 ?head. }
              SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
            }
          `;

          const url = "https://query.wikidata.org/sparql?query=" + encodeURIComponent(sparqlQuery);
          const wikidataRes = await fetch(url, {
            headers: { "Accept": "application/sparql-results+json" }
          });
          const wikidataData = await wikidataRes.json();

          // Map Wikidata results by osmId
          const wikidataMap = new Map();
          wikidataData.results.bindings.forEach(item => {
            const osmId = item.osmId.value;
            if (!wikidataMap.has(osmId)) {
              wikidataMap.set(osmId, {
                image: item.image ? item.image.value : null,
                phone: item.phone ? item.phone.value : null,
                website: item.website ? item.website.value : null,
                head: item.headLabel ? item.headLabel.value : null,
                label: item.itemLabel ? item.itemLabel.value : null,
              });
            }
          });

          // Render pharmacies with enriched data
          pharmaciesLimited.forEach(pharmacy => {
            const osmIdStr = pharmacy.osm_id.toString();
            const data = wikidataMap.get(osmIdStr) || {};

            const card = createFacilityCard({
              title: data.label || pharmacy.tags.name || "Pharmacy",
              address: buildAddress(pharmacy.tags || {}),
              distanceKm: pharmacy.distance,
              imageSrc: data.image || "https://placehold.co/600x400/png?text=No+Image+Available",
              imageAlt: data.image ? `Image of ${data.label || pharmacy.tags.name || "Pharmacy"}` : `No image available for ${data.label || pharmacy.tags.name || "Pharmacy"}`,
              phone: data.phone,
              website: data.website,
              head: data.head,
              fallbackText: "Pharmacy",
            });
            pharmacyResults.appendChild(card);
          });
        } catch (error) {
          pharmacyResults.innerHTML = `<p class="text-red-500 font-semibold">Error searching pharmacies. Please try again later.</p>`;
          console.error(error);
        }
      }

              }
              OPTIONAL { ?item wdt:P18 ?image. }
              OPTIONAL { ?item wdt:P1329 ?phone. }
              OPTIONAL { ?item wdt:P856 ?website. }
              OPTIONAL { ?item wdt:P169 ?head. }
              SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
            }
          `;

          const url = "https://query.wikidata.org/sparql?query=" + encodeURIComponent(sparqlQuery);
          const wikidataRes = await fetch(url, {
            headers: { "Accept": "application/sparql-results+json" }
          });
          const wikidataData = await wikidataRes.json();

          const wikidataMap = new Map();
          wikidataData.results.bindings.forEach(item => {
            const osmId = item.osmId.value;
            if (!wikidataMap.has(osmId)) {
              wikidataMap.set(osmId, {
                image: item.image ? item.image.value : null,
                phone: item.phone ? item.phone.value : null,
                website: item.website ? item.website.value : null,
                head: item.headLabel ? item.headLabel.value : null,
                label: item.itemLabel ? item.itemLabel.value : null,
              });
            }
          });

          hospitalsLimited.forEach(hospital => {
            const osmIdStr = hospital.osm_id.toString();
            const data = wikidataMap.get(osmIdStr) || {};

            const card = createFacilityCard({
              title: data.label || hospital.tags.name || "Hospital",
              address: buildAddress(hospital.tags || {}),
              distanceKm: hospital.distance,
              imageSrc: data.image || "dr_elianee.png",
              imageAlt: data.image ? `Image of ${data.label || hospital.tags.name || "Hospital"}` : `No image available for ${data.label || hospital.tags.name || "Hospital"}`,
              phone: data.phone,
              website: data.website,
              head: data.head,
              fallbackText: "Hospital",
            });
            hospitalResults.appendChild(card);
          });
        } catch (error) {
          hospitalResults.innerHTML = `<p class="text-red-500 font-semibold">Error searching hospitals. Please try again later.</p>`;
          console.error(error);
        }
      }

      pharmacySearchForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const location = pharmacySearchForm["pharmacy-location"].value.trim();
        if (!location) return;
        fetchPharmacies(location);
      });

      hospitalSearchForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const location = hospitalSearchForm["hospital-location"].value.trim();
        if (!location) return;
        fetchHospitals(location);
      });

      // On page load, welcome user immediately
      window.addEventListener("load", () => {
        loadPillReminders();
        renderPillReminders();
        welcomeUser();
      });
   })();
  </script>
 </body>
</html>
