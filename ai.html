<html class="scroll-smooth" lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>
   Dr Eliane AI Assistant
  </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
   body {
      font-family: "Montserrat", sans-serif;
      margin: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(26,26,26,0.8) 0%, rgba(0,31,77,0.8) 50%, rgba(47,15,15,0.8) 100%);
      color: white;
      display: flex;
      flex-direction: column;
    }
    /* Background avatar image with brightness filter */
    #background-avatar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      filter: brightness(0.4);
      z-index: -1;
      user-select: none;
      pointer-events: none;
    }
    /* Chat panel styling */
    #chat-panel {
      display: flex;
      flex-direction: column;
      background-color: rgba(243, 244, 246, 0.1);
      border-right: 1px solid rgba(209, 213, 219, 0.3);
      width: 30vw;
      max-width: 30vw;
      min-width: 280px;
      height: 100vh;
      overflow: hidden;
      transition: width 0.5s ease-in-out;
      z-index: 20;
      color: white;
      backdrop-filter: saturate(180%) blur(20px);
    }
    #chat-panel.hidden {
      width: 0;
      min-width: 0;
      overflow: hidden;
      display: none;
    }
    #chat-messages {
      flex-grow: 1;
      overflow-y: auto;
      padding: 1rem;
      scroll-behavior: smooth;
      color: white;
    }
    #chat-messages::-webkit-scrollbar {
      width: 8px;
    }
    #chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    #chat-messages::-webkit-scrollbar-thumb {
      background-color: rgba(255 255 255 / 0.3);
      border-radius: 4px;
    }
    /* Input form fixed at bottom */
    #input-form {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.6);
      border-top: 1px solid rgba(255,255,255,0.2);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 30;
      box-shadow: 0 -2px 8px rgb(0 0 0 / 0.6);
      backdrop-filter: saturate(180%) blur(20px);
    }
    #user-input {
      flex-grow: 1;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 9999px;
      padding: 0.5rem 1.5rem;
      font-size: 1rem;
      color: white;
      background: transparent;
      outline-offset: 2px;
      font-weight: 500;
      font-family: "Montserrat", sans-serif;
    }
    #user-input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    #user-input:focus {
      border-color: #00a8cc;
      box-shadow: 0 0 8px #00a8cc;
      outline: none;
      background: rgba(255 255 255 / 0.1);
    }
    /* Buttons */
    #send-btn,
    #video-talk-btn {
      background: transparent;
      border: none;
      color: #00a8cc;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 9999px;
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:hover,
    #video-talk-btn:hover,
    #send-btn:focus,
    #video-talk-btn:focus {
      color: #007a9a;
      outline: none;
      box-shadow: 0 0 0 3px #007a9a;
    }
    /* Deep Contents Button */
    #deep-contents-btn {
      position: fixed;
      bottom: 5rem;
      left: 1rem;
      background-color: #00a8cc;
      color: black;
      border-radius: 9999px;
      padding: 0.5rem 1.25rem;
      font-weight: 700;
      box-shadow: 0 4px 12px rgb(0 168 204 / 0.6);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      z-index: 40;
      transition: background-color 0.2s ease;
      font-family: "Montserrat", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.875rem;
    }
    #deep-contents-btn:hover,
    #deep-contents-btn:focus {
      background-color: #007a9a;
      outline: none;
      box-shadow: 0 0 0 4px #007a9a;
    }
    /* Deep Contents Panel */
    dialog#deep-contents-panel {
      border: none;
      padding: 0;
      margin: 0;
      background: rgba(0, 0, 0, 0.75);
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 50;
      font-family: "Montserrat", sans-serif;
      color: white;
    }
    dialog#deep-contents-panel[open] {
      display: flex;
    }
    #deep-contents-panel > div {
      background: rgba(10, 10, 10, 0.9);
      border-radius: 0.75rem;
      width: 90vw;
      max-width: 900px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgb(0 0 0 / 0.8);
      border: 1px solid #007a9a;
    }
    #deep-contents-panel header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #007a9a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #deep-contents-panel header h3 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #00a8cc;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0;
    }
    #deep-contents-close {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      color: #007a9a;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 9999px;
      transition: color 0.2s ease;
    }
    #deep-contents-close:hover,
    #deep-contents-close:focus {
      color: #00a8cc;
      outline: none;
      box-shadow: 0 0 0 3px #00a8cc;
    }
    /* Tabs navigation */
    nav[aria-label="Deep Contents Tabs"] {
      display: flex;
      border-bottom: 1px solid #007a9a;
      background: transparent;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    nav[aria-label="Deep Contents Tabs"]::-webkit-scrollbar {
      display: none;
    }
    nav[aria-label="Deep Contents Tabs"] button {
      flex: none;
      padding: 0.75rem 1.5rem;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #00a8cc;
      border-bottom: 3px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    nav[aria-label="Deep Contents Tabs"] button[aria-selected="true"] {
      color: #007a9a;
      border-color: #007a9a;
      font-weight: 900;
    }
    nav[aria-label="Deep Contents Tabs"] button:focus {
      outline: none;
      box-shadow: 0 0 0 3px #00a8cc;
    }
    /* Tabs content */
    .tab-panel {
      flex-grow: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      max-height: calc(90vh - 4.5rem - 48px);
      color: white;
    }
    .tab-panel.hidden {
      display: none;
    }
    /* Pill reminder form */
    #pill-reminder-form input,
    #pill-reminder-form textarea {
      width: 100%;
      border: 1px solid #007a9a;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      color: white;
      background: transparent;
      outline-offset: 2px;
      resize: none;
      font-family: "Montserrat", sans-serif;
      font-weight: 500;
    }
    #pill-reminder-form input:focus,
    #pill-reminder-form textarea:focus {
      border-color: #00a8cc;
      box-shadow: 0 0 8px #00a8cc;
      outline: none;
      background: rgba(255 255 255 / 0.1);
    }
    #pill-reminder-form button {
      background-color: #00a8cc;
      color: black;
      font-weight: 700;
      border: none;
      border-radius: 0.375rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
      font-family: "Montserrat", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    #pill-reminder-form button:hover,
    #pill-reminder-form button:focus {
      background-color: #007a9a;
      outline: none;
      box-shadow: 0 0 0 3px #007a9a;
      color: white;
    }
    /* Pill reminder list */
    #pill-reminder-list > div {
      border: 1px solid #00a8cc;
      background-color: rgba(0, 168, 204, 0.15);
      border-radius: 0.375rem;
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      color: white;
      font-family: "Montserrat", sans-serif;
    }
    #pill-reminder-list h4 {
      font-weight: 700;
      color: #00a8cc;
      margin: 0 0 0.25rem 0;
    }
    #pill-reminder-list time,
    #pill-reminder-list p {
      font-size: 0.875rem;
      color: #a0e9ff;
      margin: 0;
    }
    #pill-reminder-list button {
      background: transparent;
      border: none;
      color: #f87171;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 0.375rem;
      transition: color 0.2s ease;
    }
    #pill-reminder-list button:hover,
    #pill-reminder-list button:focus {
      color: #b91c1c;
      outline: none;
      box-shadow: 0 0 0 2px rgba(185, 28, 28, 0.5);
    }
    /* Pharmacy and hospital results */
    #pharmacy-results > div,
    #hospital-results > div {
      border: 1px solid #00a8cc;
      background-color: rgba(0, 168, 204, 0.15);
      border-radius: 0.375rem;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      color: white;
      font-family: "Montserrat", sans-serif;
    }
    #pharmacy-results h4,
    #hospital-results h4 {
      font-weight: 700;
      color: #00a8cc;
      margin: 0 0 0.25rem 0;
    }
    #pharmacy-results p,
    #hospital-results p,
    #hospital-results a {
      font-size: 0.875rem;
      color: #a0e9ff;
      margin: 0.125rem 0;
    }
    #hospital-results a {
      text-decoration: none;
      font-weight: 700;
      color: #00a8cc;
      transition: color 0.2s ease;
    }
    #hospital-results a:hover,
    #hospital-results a:focus {
      color: #007a9a;
      outline: none;
      text-decoration: underline;
    }
    /* Avatar container */
    #avatar-container {
      flex-grow: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
      transition: width 0.5s ease-in-out;
      user-select: none;
    }
    /* Avatar image */
    #avatar-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 0.5rem;
      user-select: none;
      pointer-events: none;
      /* Removed animations */
      transform-origin: center bottom;
      position: relative;
      z-index: 10;
      filter: drop-shadow(0 0 4px rgba(0, 168, 204, 0.7));
    }
    /* Static avatar behind for smoothness */
    #avatar-static {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 0.5rem;
      user-select: none;
      pointer-events: none;
      z-index: 5;
      opacity: 1;
      transition: opacity 0.3s ease;
      filter: drop-shadow(0 0 4px rgba(0, 168, 204, 0.5));
    }
    /* Audio wave for live talk */
    #audio-wave {
      position: absolute;
      bottom: 3.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.25rem;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.3s ease;
      z-index: 20;
    }
    #audio-wave span {
      width: 0.25rem;
      border-radius: 9999px;
      background-color: #00a8cc;
      animation: pulse 1.5s infinite ease-in-out;
    }
    #audio-wave span:nth-child(2) {
      animation-delay: 0.15s;
      height: 1.5rem;
    }
    #audio-wave span:nth-child(4) {
      animation-delay: 0.45s;
      height: 1.25rem;
    }
    #audio-wave span:nth-child(5) {
      animation-delay: 0.6s;
      height: 1rem;
    }
    #audio-wave span:nth-child(1),
    #audio-wave span:nth-child(3) {
      height: 1.25rem;
      animation-delay: 0s, 0.3s;
    }
    /* Animations */
    @keyframes pulse {
      0%, 100% {
        opacity: 0.3;
        transform: scaleY(1);
      }
      50% {
        opacity: 1;
        transform: scaleY(1.8);
      }
    }
    /* Responsive adjustments */
    @media (max-width: 768px) {
      #chat-panel {
        width: 100vw;
        max-width: 100vw;
        min-width: 100vw;
        height: 40vh;
        border-right: none;
        border-top: 1px solid rgba(209, 213, 219, 0.3);
      }
      #main-container {
        flex-direction: column;
      }
      #avatar-image {
        width: 100vw !important;
        height: auto !important;
      }
    }
  </style>
 </head>
 <body>
  <img alt="Cheerful darkskinned girl smiling broadly with natural hair, representing Dr Eliane AI assistant" id="background-avatar" src="https://www.shutterstock.com/image-photo/cheerful-darkskinned-girl-smiling-broadly-600nw-635442125.jpg"/>
  <div class="relative w-screen h-screen flex flex-col overflow-hidden" id="app">
   <!-- Main container -->
   <main aria-label="Dr Eliane AI Assistant main interface" class="flex flex-row w-full h-full transition-all duration-500 ease-in-out" id="main-container" style="width: 100vw; height: 100vh;">
    <!-- Chat panel -->
    <section aria-label="Chat panel with Dr Eliane" class="hidden" id="chat-panel" role="region" aria-live="polite" aria-atomic="false">
     <header class="flex items-center justify-between px-4 py-3 border-b border-white/30 bg-transparent">
      <h2 class="text-lg font-bold text-white tracking-widest select-none">
       Chat with Dr Eliane
      </h2>
      <button aria-label="Close chat panel" class="text-white hover:text-[#00a8cc] focus:outline-none" id="close-chat" type="button">
       <i class="fas fa-times fa-lg"></i>
      </button>
     </header>
     <div class="flex flex-col space-y-4 px-4 py-3 overflow-y-auto" id="chat-messages" role="log" tabindex="0" style="color: white;">
     </div>
    </section>
    <!-- Avatar container -->
    <section aria-label="Dr Eliane AI Avatar" id="avatar-container" class="select-none">
     <img alt="Portrait of a cheerful dark-skinned young woman smiling broadly, wearing casual clothes, representing Dr Eliane AI assistant" draggable="false" height="800" id="avatar-image" src="https://www.shutterstock.com/image-photo/cheerful-darkskinned-girl-smiling-broadly-600nw-635442125.jpg" width="600" decoding="async" loading="eager"/>
     <img alt="Portrait of a cheerful dark-skinned young woman smiling broadly, wearing casual clothes, representing Dr Eliane AI assistant" class="absolute top-0 left-0 w-full h-full object-contain rounded-lg pointer-events-none" draggable="false" id="avatar-static" src="https://www.shutterstock.com/image-photo/cheerful-darkskinned-girl-smiling-broadly-600nw-635442125.jpg" style="user-select:none;" decoding="async" loading="eager"/>
     <div aria-hidden="true" id="audio-wave" class="hidden">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
     </div>
    </section>
   </main>
   <!-- Input and controls fixed at bottom -->
   <form aria-label="User input form" id="input-form" role="search" class="flex items-center gap-3 px-4 py-3 fixed bottom-0 left-0 right-0 bg-black/60 border-t border-white/20 backdrop-blur-md z-30">
    <input aria-label="Type your health question" autocomplete="off" id="user-input" placeholder="Ask Dr Eliane your health question..." required="" type="text" class="flex-grow w-[200px] rounded-full border border-white/30 bg-transparent px-6 py-2 text-white placeholder-white/60 focus:border-[#00a8cc] focus:outline-none focus:ring-1 focus:ring-[#00a8cc] font-semibold font-montserrat"/>
    <button aria-label="Send message" id="send-btn" type="submit" class="text-[#00a8cc] hover:text-[#007a9a] focus:outline-none focus:ring-2 focus:ring-[#007a9a] rounded-full p-2 text-2xl">
     <i class="fas fa-paper-plane"></i>
    </button>
    <button aria-label="Start video talk mode" id="video-talk-btn" type="button" class="text-[#00a8cc] hover:text-[#007a9a] focus:outline-none focus:ring-2 focus:ring-[#007a9a] rounded-full p-2 text-2xl">
     <i class="fas fa-video"></i>
    </button>
   </form>
   <!-- Deep Contents Button fixed bottom-left -->
   <button aria-controls="deep-contents-panel" aria-expanded="false" aria-haspopup="dialog" id="deep-contents-btn" title="Open Deep Contents" class="fixed bottom-20 left-4 bg-[#00a8cc] text-black rounded-full px-6 py-2 font-bold shadow-lg hover:bg-[#007a9a] focus:outline-none focus:ring-4 focus:ring-[#007a9a] tracking-widest text-sm uppercase z-40 flex items-center gap-2 select-none">
    <i class="fas fa-folder-open fa-lg"></i>
    <span class="hidden sm:inline font-bold">Track</span>
   </button>
   <!-- Deep Contents Panel (dialog) -->
   <dialog aria-labelledby="deep-contents-title" aria-modal="true" id="deep-contents-panel" role="dialog" class="font-montserrat text-white">
    <div class="bg-black/90 border border-[#007a9a] rounded-xl max-w-4xl max-h-[90vh] w-[90vw] flex flex-col overflow-hidden shadow-2xl">
     <header class="flex justify-between items-center border-b border-[#007a9a] px-6 py-4">
      <h3 id="deep-contents-title" class="text-2xl font-extrabold uppercase tracking-widest text-[#00a8cc] m-0">
       Deep Contents
      </h3>
      <button aria-label="Close Deep Contents panel" id="deep-contents-close" type="button" class="text-[#007a9a] hover:text-[#00a8cc] focus:outline-none focus:ring-4 focus:ring-[#00a8cc] rounded-full p-1 text-2xl">
       <i class="fas fa-times"></i>
      </button>
     </header>
     <nav aria-label="Deep Contents Tabs" class="flex border-b border-[#007a9a] overflow-x-auto scrollbar-hide">
      <button aria-controls="tab-pill-reminder" aria-selected="true" class="tab-btn text-[#00a8cc] font-extrabold uppercase tracking-widest border-b-4 border-transparent px-6 py-3 cursor-pointer focus:outline-none" id="tab-btn-pill-reminder" role="tab" tabindex="0">
       💊 Pill Reminder System
      </button>
      <button aria-controls="tab-pharmacies" aria-selected="false" class="tab-btn text-[#00a8cc] font-extrabold uppercase tracking-widest border-b-4 border-transparent px-6 py-3 cursor-pointer focus:outline-none" id="tab-btn-pharmacies" role="tab" tabindex="-1">
       🏪 Find Nearby Pharmacies
      </button>
      <button aria-controls="tab-hospitals" aria-selected="false" class="tab-btn text-[#00a8cc] font-extrabold uppercase tracking-widest border-b-4 border-transparent px-6 py-3 cursor-pointer focus:outline-none" id="tab-btn-hospitals" role="tab" tabindex="-1">
       🏥 Find Nearby Hospitals
      </button>
     </nav>
     <section aria-labelledby="tab-btn-pill-reminder" class="tab-panel p-6 overflow-y-auto flex-grow" id="tab-pill-reminder" role="tabpanel" tabindex="0">
      <form id="pill-reminder-form" class="space-y-6 max-w-xl mx-auto">
       <div>
        <label for="pill-name" class="block mb-2 font-bold text-[#00a8cc] uppercase tracking-widest">Pill Name</label>
        <input id="pill-name" name="pill-name" placeholder="Enter pill name" required="" type="text" class="w-full rounded-md border border-[#00a8cc] bg-transparent px-4 py-2 text-white placeholder-white/60 focus:border-[#007a9a] focus:ring-1 focus:ring-[#007a9a] focus:outline-none font-semibold"/>
       </div>
       <div>
        <label for="pill-datetime" class="block mb-2 font-bold text-[#00a8cc] uppercase tracking-widest">Date &amp; Time</label>
        <input id="pill-datetime" name="pill-datetime" required="" type="datetime-local" class="w-full rounded-md border border-[#00a8cc] bg-transparent px-4 py-2 text-white placeholder-white/60 focus:border-[#007a9a] focus:ring-1 focus:ring-[#007a9a] focus:outline-none font-semibold"/>
       </div>
       <div>
        <label for="pill-notes" class="block mb-2 font-bold text-[#00a8cc] uppercase tracking-widest">Notes (optional)</label>
        <textarea id="pill-notes" name="pill-notes" placeholder="Additional info or instructions" rows="3" class="w-full rounded-md border border-[#00a8cc] bg-transparent px-4 py-2 text-white placeholder-white/60 focus:border-[#007a9a] focus:ring-1 focus:ring-[#007a9a] focus:outline-none font-semibold resize-none"></textarea>
       </div>
       <button type="submit" class="w-full bg-[#00a8cc] text-black font-extrabold uppercase tracking-widest rounded-md py-3 hover:bg-[#007a9a] focus:outline-none focus:ring-4 focus:ring-[#007a9a] transition">
        Add Pill Reminder
       </button>
      </form>
      <div id="pill-reminder-list" class="mt-8 space-y-4 max-w-xl mx-auto"></div>
     </section>
     <section aria-labelledby="tab-btn-pharmacies" class="tab-panel hidden p-6 overflow-y-auto flex-grow" id="tab-pharmacies" role="tabpanel" tabindex="0">
      <form id="pharmacy-search-form" class="mb-6 flex gap-4 max-w-xl mx-auto">
       <input id="pharmacy-location" name="pharmacy-location" placeholder="Enter your location (city, address, zip)" required="" type="text" class="flex-grow rounded-md border border-[#00a8cc] bg-transparent px-4 py-2 text-white placeholder-white/60 focus:border-[#007a9a] focus:ring-1 focus:ring-[#007a9a] focus:outline-none font-semibold"/>
       <button type="submit" class="bg-[#00a8cc] text-black font-extrabold uppercase tracking-widest rounded-md px-6 py-3 hover:bg-[#007a9a] focus:outline-none focus:ring-4 focus:ring-[#007a9a] transition">
        Search
       </button>
      </form>
      <div id="pharmacy-results" class="space-y-4 max-w-xl mx-auto"></div>
     </section>
     <section aria-labelledby="tab-btn-hospitals" class="tab-panel hidden p-6 overflow-y-auto flex-grow" id="tab-hospitals" role="tabpanel" tabindex="0">
      <form id="hospital-search-form" class="mb-6 flex gap-4 max-w-xl mx-auto">
       <input id="hospital-location" name="hospital-location" placeholder="Enter your location (city, address, zip)" required="" type="text" class="flex-grow rounded-md border border-[#00a8cc] bg-transparent px-4 py-2 text-white placeholder-white/60 focus:border-[#007a9a] focus:ring-1 focus:ring-[#007a9a] focus:outline-none font-semibold"/>
       <button type="submit" class="bg-[#00a8cc] text-black font-extrabold uppercase tracking-widest rounded-md px-6 py-3 hover:bg-[#007a9a] focus:outline-none focus:ring-4 focus:ring-[#007a9a] transition">
        Search
       </button>
      </form>
      <div id="hospital-results" class="space-y-4 max-w-xl mx-auto"></div>
     </section>
    </div>
   </dialog>
  </div>
  <script>
   (() => {
      // Elements
      const avatarImage = document.getElementById("avatar-image");
      const avatarStatic = document.getElementById("avatar-static");
      const chatPanel = document.getElementById("chat-panel");
      const chatMessages = document.getElementById("chat-messages");
      const mainContainer = document.getElementById("main-container");
      const inputForm = document.getElementById("input-form");
      const userInput = document.getElementById("user-input");
      const sendBtn = document.getElementById("send-btn");
      const videoTalkBtn = document.getElementById("video-talk-btn");
      const deepContentsBtn = document.getElementById("deep-contents-btn");
      const deepContentsPanel = document.getElementById("deep-contents-panel");
      const deepContentsClose = document.getElementById("deep-contents-close");
      const closeChatBtn = document.getElementById("close-chat");
      const audioWave = document.getElementById("audio-wave");

      // Tabs
      const tabButtons = document.querySelectorAll(".tab-btn");
      const tabPanels = document.querySelectorAll(".tab-panel");

      // Pill Reminder Elements
      const pillReminderForm = document.getElementById("pill-reminder-form");
      const pillReminderList = document.getElementById("pill-reminder-list");

      // Pharmacy Elements
      const pharmacySearchForm = document.getElementById("pharmacy-search-form");
      const pharmacyResults = document.getElementById("pharmacy-results");

      // Hospital Elements
      const hospitalSearchForm = document.getElementById("hospital-search-form");
      const hospitalResults = document.getElementById("hospital-results");

      // State
      let mode = "video"; // 'video' or 'text'
      let chatOpen = false;
      let pillReminders = [];
      let recognition = null;
      let isListening = false;

      // Sample AI greeting message
      const greetingMessage = {
        from: "ai",
        type: "text",
        content:
          "Hello! I'm Dr Eliane, your AI health assistant. How can I help you today?",
        timestamp: new Date().toISOString(),
      };

      // Utility: format time
      function formatTime(date) {
        const d = new Date(date);
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      // Add chat message
      function addChatMessage({ from, type, content, timestamp }) {
        const messageWrapper = document.createElement("div");
        messageWrapper.className = from === "user" ? "flex justify-end" : "flex justify-start";

        const messageBubble = document.createElement("div");
        messageBubble.className =
          "max-w-[75%] px-4 py-2 rounded-lg shadow " +
          (from === "user"
            ? "bg-[#00a8cc] text-black rounded-br-none"
            : "bg-white/20 text-white rounded-bl-none");

        if (type === "text") {
          messageBubble.textContent = content;
        } else if (type === "video") {
          // For simulation, show avatar image with label
          const videoReply = document.createElement("div");
          videoReply.className = "relative w-48 h-64 rounded-lg overflow-hidden shadow-lg";

          const videoImg = document.createElement("img");
          videoImg.src =
            "https://placehold.co/600x800/png?text=Simulated+video+reply+avatar+of+Dr+Eliane+AI+assistant+speaking+and+smiling";
          videoImg.alt =
            "Simulated video reply avatar of Dr Eliane AI assistant speaking and smiling";
          videoImg.className = "object-cover w-full h-full";

          const label = document.createElement("span");
          label.textContent = "Video Reply";
          label.className =
            "absolute bottom-1 left-1 bg-[#00a8cc] text-black text-xs px-2 py-0.5 rounded";

          videoReply.appendChild(videoImg);
          videoReply.appendChild(label);
          messageBubble.appendChild(videoReply);
        }

        const timeSpan = document.createElement("time");
        timeSpan.className = "block text-xs text-white/80 mt-1";
        timeSpan.dateTime = timestamp;
        timeSpan.textContent = formatTime(timestamp);

        messageBubble.appendChild(timeSpan);
        messageWrapper.appendChild(messageBubble);
        chatMessages.appendChild(messageWrapper);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      // Switch to text mode layout
      function switchToTextMode() {
        if (mode === "text") return;
        mode = "text";
        chatOpen = true;
        chatPanel.classList.remove("hidden");
        mainContainer.style.width = "100vw";
        mainContainer.style.height = "100vh";
        mainContainer.style.display = "flex";
        mainContainer.style.flexDirection = "row";
        mainContainer.style.transition = "all 0.5s ease-in-out";
        mainContainer.style.gap = "0";
        avatarImage.style.width = "70vw";
        avatarImage.style.height = "auto";
        avatarStatic.style.opacity = "1";
        audioWave.classList.add("hidden");
        userInput.focus();
      }

      // Switch to video mode layout
      function switchToVideoMode() {
        if (mode === "video") return;
        mode = "video";
        chatOpen = false;
        chatPanel.classList.add("hidden");
        mainContainer.style.width = "100vw";
        mainContainer.style.height = "100vh";
        mainContainer.style.display = "flex";
        mainContainer.style.flexDirection = "row";
        mainContainer.style.transition = "all 0.5s ease-in-out";
        avatarImage.style.width = "100vw";
        avatarImage.style.height = "auto";
        avatarStatic.style.opacity = "1";
        audioWave.classList.remove("hidden");
        userInput.focus();
      }

      // Close chat panel (switch back to video mode)
      function closeChatPanel() {
        switchToVideoMode();
        userInput.value = "";
      }

      // Simulate AI response (text or video)
      function simulateAIResponse(userText) {
        const lowerText = userText.toLowerCase();

        // Decide response type: text or video
        let responseType = "video";
        if (
          lowerText.includes("pill") ||
          lowerText.includes("reminder") ||
          lowerText.includes("pharmacy") ||
          lowerText.includes("hospital") ||
          lowerText.includes("symptom") ||
          lowerText.includes("mental") ||
          lowerText.includes("sexual") ||
          lowerText.includes("women") ||
          lowerText.includes("period") ||
          lowerText.includes("weight")
        ) {
          responseType = "text";
        }

        // Sample responses
        let responseText = "";
        if (lowerText.includes("hello") || lowerText.includes("hi")) {
          responseText =
            "Hello! I'm Dr Eliane, your AI health assistant. How can I help you today?";
        } else if (lowerText.includes("pill")) {
          responseText =
            "Based on your symptoms and weight, I recommend taking the prescribed pills on schedule. Use the Pill Reminder System for assistance.";
        } else if (lowerText.includes("hospital")) {
          responseText =
            "If your symptoms worsen or you experience severe pain, please visit the nearest hospital immediately.";
        } else if (lowerText.includes("mental health")) {
          responseText =
            "Mental health is important. I recommend regular check-ins and professional support if needed.";
        } else if (lowerText.includes("sexual health")) {
          responseText =
            "For sexual health concerns, please ensure safe practices and consult a specialist if symptoms persist.";
        } else if (lowerText.includes("period")) {
          responseText =
            "Women’s health and periods can vary. Track your cycle and consult if irregularities occur.";
        } else if (lowerText.includes("symptom")) {
          responseText =
            "Please describe your symptoms in detail so I can assist you better.";
        } else {
          responseText =
            "I'm here to help with your health questions. Could you please provide more details?";
        }

        if (mode === "text") {
          addChatMessage({
            from: "ai",
            type: "text",
            content: responseText,
            timestamp: new Date().toISOString(),
          });
        } else {
          addChatMessage({
            from: "ai",
            type: "video",
            content: "",
            timestamp: new Date().toISOString(),
          });
          // Also speak the response using speech synthesis
          speakText(responseText);
        }
      }

      // Speech synthesis for AI responses
      function speakText(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 1;
        utterance.pitch = 1;
        window.speechSynthesis.speak(utterance);
      }

      // Start voice recognition for video talk mode
      function startListening() {
        if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
          alert("Sorry, your browser does not support Speech Recognition.");
          return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.continuous = false;

        recognition.onstart = () => {
          isListening = true;
          audioWave.classList.remove("hidden");
          videoTalkBtn.classList.add("text-[#007a9a]");
        };

        recognition.onend = () => {
          isListening = false;
          audioWave.classList.add("hidden");
          videoTalkBtn.classList.remove("text-[#007a9a]");
        };

        recognition.onerror = (event) => {
          isListening = false;
          audioWave.classList.add("hidden");
          videoTalkBtn.classList.remove("text-[#007a9a]");
          console.error("Speech recognition error", event.error);
        };

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript.trim();
          if (transcript) {
            addChatMessage({
              from: "user",
              type: "text",
              content: transcript,
              timestamp: new Date().toISOString(),
            });
            simulateAIResponse(transcript);
          }
        };

        recognition.start();
      }

      // Stop voice recognition
      function stopListening() {
        if (recognition) {
          recognition.stop();
          recognition = null;
        }
      }

      // Handle form submit (send message)
      inputForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if (!text) return;

        addChatMessage({
          from: "user",
          type: "text",
          content: text,
          timestamp: new Date().toISOString(),
        });

        userInput.value = "";

        switchToTextMode();

        setTimeout(() => {
          simulateAIResponse(text);
        }, 1000);
      });

      // Video talk button toggles video mode and voice recognition
      videoTalkBtn.addEventListener("click", () => {
        if (mode !== "video") {
          switchToVideoMode();
        }
        if (isListening) {
          stopListening();
        } else {
          startListening();
        }
      });

      // Close chat panel button
      closeChatBtn.addEventListener("click", () => {
        closeChatPanel();
        stopListening();
      });

      // Deep Contents button open panel
      deepContentsBtn.addEventListener("click", () => {
        if (typeof deepContentsPanel.showModal === "function") {
          deepContentsPanel.showModal();
        } else {
          deepContentsPanel.setAttribute("open", "");
        }
        deepContentsBtn.setAttribute("aria-expanded", "true");
        tabButtons[0].click();
        tabButtons[0].focus();
      });

      // Deep Contents close button
      deepContentsClose.addEventListener("click", () => {
        if (typeof deepContentsPanel.close === "function") {
          deepContentsPanel.close();
        } else {
          deepContentsPanel.removeAttribute("open");
        }
        deepContentsBtn.setAttribute("aria-expanded", "false");
        deepContentsBtn.focus();
      });

      // Close Deep Contents on outside click or Escape
      deepContentsPanel.addEventListener("click", (e) => {
        if (e.target === deepContentsPanel) {
          if (typeof deepContentsPanel.close === "function") {
            deepContentsPanel.close();
          } else {
            deepContentsPanel.removeAttribute("open");
          }
          deepContentsBtn.setAttribute("aria-expanded", "false");
          deepContentsBtn.focus();
        }
      });
      deepContentsPanel.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          e.preventDefault();
          if (typeof deepContentsPanel.close === "function") {
            deepContentsPanel.close();
          } else {
            deepContentsPanel.removeAttribute("open");
          }
          deepContentsBtn.setAttribute("aria-expanded", "false");
          deepContentsBtn.focus();
        }
      });

      // Accessibility: trap focus inside deep contents panel when open
      deepContentsPanel.addEventListener("keydown", (e) => {
        if (e.key === "Tab") {
          const focusableElements = deepContentsPanel.querySelectorAll(
            'a[href], button:not([disabled]), textarea, input, select, [tabindex]:not([tabindex="-1"])'
          );
          const firstElement = focusableElements[0];
          const lastElement = focusableElements[focusableElements.length - 1];

          if (e.shiftKey) {
            if (document.activeElement === firstElement) {
              e.preventDefault();
              lastElement.focus();
            }
          } else {
            if (document.activeElement === lastElement) {
              e.preventDefault();
              firstElement.focus();
            }
          }
        }
      });

      // Pill Reminder System logic
      function renderPillReminders() {
        pillReminderList.innerHTML = "";
        if (pillReminders.length === 0) {
          const emptyMsg = document.createElement("p");
          emptyMsg.className = "text-center text-white/70 font-semibold";
          emptyMsg.textContent = "No pill reminders scheduled.";
          pillReminderList.appendChild(emptyMsg);
          return;
        }
        pillReminders.forEach((reminder, i) => {
          const card = document.createElement("div");
          card.className =
            "border border-[#00a8cc] rounded-md p-4 bg-[#00a8cc]/15 shadow-sm flex justify-between items-start space-x-4";

          const info = document.createElement("div");
          info.className = "flex flex-col space-y-1";

          const name = document.createElement("h4");
          name.className = "font-extrabold text-[#00a8cc] text-lg";
          name.textContent = reminder.name;

          const datetime = document.createElement("time");
          datetime.className = "text-[#a0e9ff] text-sm";
          datetime.dateTime = reminder.datetime;
          datetime.textContent = new Date(reminder.datetime).toLocaleString();

          const notes = document.createElement("p");
          notes.className = "text-[#a0e9ff] text-sm whitespace-pre-wrap";
          notes.textContent = reminder.notes || "";

          info.appendChild(name);
          info.appendChild(datetime);
          if (reminder.notes) info.appendChild(notes);

          const delBtn = document.createElement("button");
          delBtn.className =
            "text-[#f87171] hover:text-[#b91c1c] focus:outline-none focus:ring-2 focus:ring-[#b91c1c] rounded p-1";
          delBtn.setAttribute("aria-label", `Delete pill reminder for ${reminder.name}`);
          delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
          delBtn.addEventListener("click", () => {
            pillReminders.splice(i, 1);
            renderPillReminders();
          });

          card.appendChild(info);
          card.appendChild(delBtn);
          pillReminderList.appendChild(card);
        });
      }
    })();
  </script>
 </body>
</html>
